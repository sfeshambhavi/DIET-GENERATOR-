name: NutriGen CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest test_app.py -v --tb=short
    env:
      MONGO_URI: ${{ secrets.MONGO_URI }}

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest

  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

        - name: Install dependencies
  run: |
    pip install -r requirements.txt
    pip install webdriver-manager selenium

      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb

      - name: Start Flask app
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python3 app.py > app.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -s http://localhost:5001/api/ping | grep -q "connected"; then
              echo "App is ready!"; break
            fi
            echo "Waiting for app... attempt $i"
            sleep 3
          done

      - name: Run Selenium tests
        env:
          APP_URL: http://localhost:5001
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_selenium.py -v --tb=short

      - name: Show logs on failure
        if: failure()
        run: cat app.log