name: NutriGen CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_app.py -v --tb=short

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:${{ github.sha }}

  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
      - name: Install webdriver-manager
        run: pip install webdriver-manager
      - name: Start Flask app in background
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python3 app.py > app.log 2>&1 &
          echo "Waiting for app to be ready..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:5001/ | grep -q "NutriGen"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done
      - name: Run Selenium tests
        env:
          APP_URL: http://localhost:5001
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_selenium.py -v --tb=short
      - name: Show app logs on failure
        if: failure()
        run: cat app.log

  push-metrics:
    name: Push Metrics to Grafana
    runs-on: ubuntu-latest
    needs: selenium-tests
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests snappy
      - name: Start Flask and generate metrics
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python3 app.py > app.log 2>&1 &
          echo "Waiting for app..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:5001/ | grep -q "NutriGen"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done
          curl -s http://localhost:5001/ > /dev/null || true
          curl -s http://localhost:5001/api/ping > /dev/null || true
      - name: Push metrics to Grafana Cloud
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          python3 - <<'EOF'
          import os, time, requests, struct, snappy

          url = os.environ["GRAFANA_URL"]
          username = os.environ["GRAFANA_USERNAME"]
          api_key = os.environ["GRAFANA_API_KEY"]

          def create_proto_metric(name, value, timestamp_ms, labels={}):
              # Simple protobuf encoding for a single timeseries
              def encode_string(field, s):
                  b = s.encode()
                  return bytes([field << 3 | 2]) + encode_varint(len(b)) + b

              def encode_varint(n):
                  result = []
                  while n > 127:
                      result.append((n & 0x7F) | 0x80)
                      n >>= 7
                  result.append(n)
                  return bytes(result)

              def encode_double(field, d):
                  import struct
                  return bytes([field << 3 | 1]) + struct.pack('<d', d)

              def encode_int64(field, n):
                  return bytes([field << 3 | 0]) + encode_varint(n)

              # Build label pairs
              all_labels = {"__name__": name, "job": "nutrigen", "env": "ci"}
              all_labels.update(labels)

              label_bytes = b""
              for k, v in all_labels.items():
                  lp = encode_string(1, k) + encode_string(2, v)
                  label_bytes += bytes([1 << 3 | 2]) + encode_varint(len(lp)) + lp

              # Build sample
              sample = encode_double(1, float(value)) + encode_int64(2, timestamp_ms)
              sample_bytes = bytes([2 << 3 | 2]) + encode_varint(len(sample)) + sample

              ts = label_bytes + sample_bytes
              return bytes([1 << 3 | 2]) + encode_varint(len(ts)) + ts

          now_ms = int(time.time() * 1000)
          metrics = [
              ("nutrigen_ci_build_total", 1),
              ("nutrigen_ci_success", 1),
              ("nutrigen_app_up", 1),
          ]

          proto = b""
          for name, val in metrics:
              proto += create_proto_metric(name, val, now_ms)

          compressed = snappy.compress(proto)

          response = requests.post(
              url,
              data=compressed,
              auth=(username, api_key),
              headers={
                  "Content-Type": "application/x-protobuf",
                  "Content-Encoding": "snappy",
                  "X-Prometheus-Remote-Write-Version": "0.1.0"
              }
          )
          print(f"Push status: {response.status_code}")
          print(response.text)
          if response.status_code not in [200, 204]:
              exit(1)
          print("Done!")
          EOF
      - name: Show app logs on failure
        if: failure()
        run: cat app.log
