name: NutriGen CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1 — Unit Tests
  # ════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_app.py -v --tb=short

  # ════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Image
  # ════════════════════════════════════════════════════════
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:${{ github.sha }}

  # ════════════════════════════════════════════════════════
  # JOB 3 — Selenium Tests
  # ════════════════════════════════════════════════════════
  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env file
        run: echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env

      - name: Seed MongoDB
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: python seed_db.py

      - name: Start Flask app in background
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python app.py > app.log 2>&1 &
          echo "Waiting for app to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:5001/api/ping | grep -q "connected"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - not ready yet..."
            sleep 2
          done

      - name: Install Chrome and ChromeDriver
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
          pip install webdriver-manager

      - name: Run Selenium tests
        env:
          APP_URL: http://localhost:5001
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_selenium.py -v --tb=short

      - name: Show app logs on failure
        if: failure()
        run: cat app.log
