name: NutriGen CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ════════════════════════════════════════════════════════
  # JOB 1 — Unit Tests
  # ════════════════════════════════════════════════════════
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_app.py -v --tb=short

  # ════════════════════════════════════════════════════════
  # JOB 2 — Build & Push Docker Image
  # ════════════════════════════════════════════════════════
  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:${{ github.sha }}

  # ════════════════════════════════════════════════════════
  # JOB 3 — Selenium Tests (runs app in Docker)
  # ════════════════════════════════════════════════════════
  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env

      - name: Start app container
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
          docker run -d \
            --name nutrigen_app \
            --env-file .env \
            -p 5001:5001 \
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest

      - name: Start Selenium Chrome container
        run: |
          docker run -d \
            --name selenium_chrome \
            --shm-size="2g" \
            -p 4444:4444 \
            selenium/standalone-chrome:latest

      - name: Seed MongoDB
        run: |
          pip install -r requirements.txt
          python seed_db.py
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}

      - name: Wait for app to be ready
        run: |
          echo "Waiting for app..."
          for i in $(seq 1 20); do
            if curl -s http://localhost:5001/api/ping | grep -q "connected"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - waiting..."
            sleep 3
          done

      - name: Set up Python for Selenium
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run Selenium tests
        env:
          APP_URL: http://localhost:5001
          SELENIUM_HUB: http://localhost:4444/wd/hub
        run: pytest test_selenium.py -v --tb=short

      - name: Show app logs on failure
        if: failure()
        run: docker logs nutrigen_app

  # ════════════════════════════════════════════════════════
  # JOB 4 — Deploy (main branch only)
  # ════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: selenium-tests
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key:      ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/nutrigen
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" > .env
            docker pull ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            docker stop nutrigen_app || true
            docker rm   nutrigen_app || true
            docker run -d \
              --name nutrigen_app \
              --env-file .env \
              -p 5001:5001 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            python seed_db.py || true
            echo "Deployed at $(date)"
