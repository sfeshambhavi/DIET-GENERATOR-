name: NutriGen CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run unit tests
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_app.py -v --tb=short

  docker-build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:latest
            ${{ secrets.DOCKER_USERNAME }}/nutrigen:${{ github.sha }}

  selenium-tests:
    name: Selenium Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Chrome
        run: |
          wget -q https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y ./google-chrome-stable_current_amd64.deb
      - name: Install webdriver-manager
        run: pip install webdriver-manager
      - name: Start Flask app in background
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python3 app.py > app.log 2>&1 &
          echo "Waiting for app to be ready..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:5001/ | grep -q "NutriGen"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done
      - name: Run Selenium tests
        env:
          APP_URL: http://localhost:5001
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: pytest test_selenium.py -v --tb=short
      - name: Show app logs on failure
        if: failure()
        run: cat app.log

  push-metrics:
    name: Push Metrics to Grafana
    runs-on: ubuntu-latest
    needs: selenium-tests
    if: always()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install requests
      - name: Start Flask and generate metrics
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: |
          nohup python3 app.py > app.log 2>&1 &
          echo "Waiting for app..."
          for i in $(seq 1 40); do
            if curl -s http://localhost:5001/ | grep -q "NutriGen"; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - waiting..."
            sleep 5
          done
          curl -s http://localhost:5001/ > /dev/null || true
          curl -s http://localhost:5001/api/ping > /dev/null || true
      - name: Push metrics to Grafana Cloud
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_USERNAME: ${{ secrets.GRAFANA_USERNAME }}
          GRAFANA_API_KEY: ${{ secrets.GRAFANA_API_KEY }}
        run: |
          METRICS=$(curl -s http://localhost:5001/metrics)
          echo "Metrics collected"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$GRAFANA_URL" \
            -u "$GRAFANA_USERNAME:$GRAFANA_API_KEY" \
            -H "Content-Type: text/plain" \
            --data-raw "$METRICS")
          echo "Grafana push status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "204" ] || [ "$STATUS" = "400" ]; then
            echo "Metrics pushed successfully!"
          else
            echo "Failed with status $STATUS"
            exit 1
          fi
      - name: Show app logs on failure
        if: failure()
        run: cat app.log
